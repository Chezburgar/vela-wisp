name: Keep WISP awake

# Render free instances sleep after ~15 min idle. This pings the health
# endpoint every ~10 min so the server stays warm and proxying is instant.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping WISP server
        run: |
          curl -fsS --max-time 60 --retry 3 --retry-delay 10 \
            https://vela-wisp.onrender.com/ \
            && echo "WISP server is awake."
